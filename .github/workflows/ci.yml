name: Mentora CI

# Runs the full Mentora test pyramid on every PR and on pushes to main.
on:
  push:
    branches: [main]
    paths: ['mentora/**', '.github/workflows/ci.yml']
  pull_request:
    paths: ['mentora/**', '.github/workflows/ci.yml']

defaults:
  run:
    working-directory: mentora

jobs:
  # ── Typecheck, build, and the no-DB suites (unit + component) ──────────────
  build-and-unit:
    name: Build · typecheck · unit + component
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mentora/package-lock.json
      - run: npm ci
      - name: Build shared package
        run: npm run build --workspace=@mentora/shared
      - name: Generate Prisma client
        run: npm run db:generate --workspace=@mentora/api
      - name: Typecheck all workspaces
        run: npm run typecheck
      - name: Unit tests (@mentora/shared)
        run: npm run test --workspace=@mentora/shared
      - name: Component tests (@mentora/web)
        run: npm run test --workspace=@mentora/web

  # ── API integration tests against a real Postgres ─────────────────────────
  integration:
    name: Integration (API + Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mentora
          POSTGRES_PASSWORD: mentora
          POSTGRES_DB: mentora
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U mentora"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://mentora:mentora@localhost:5432/mentora?schema=public
      JWT_SECRET: ci-test-secret
      OCR_DRIVER: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mentora/package-lock.json
      - run: npm ci
      - run: npm run build --workspace=@mentora/shared
      - name: Apply migrations
        run: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma
      - name: Integration tests (@mentora/api)
        run: npm run test --workspace=@mentora/api

  # ── End-to-end tests against the running web + api stack ───────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mentora
          POSTGRES_PASSWORD: mentora
          POSTGRES_DB: mentora
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U mentora"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://mentora:mentora@localhost:5432/mentora?schema=public
      JWT_SECRET: ci-e2e-secret
      NEXT_PUBLIC_API_URL: http://localhost:4000
      WEB_URL: http://localhost:3000
      # All integrations use their key-free drivers in CI.
      LLM_DRIVER: stub
      RESEARCH_DRIVER: stub
      VIDEO_DRIVER: mock
      PAYMENTS_DRIVER: mock
      OCR_DRIVER: mock
      STORAGE_DRIVER: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mentora/package-lock.json
      - run: npm ci
      - name: Build shared + api + web
        run: |
          npm run build --workspace=@mentora/shared
          npm run build --workspace=@mentora/api
          npm run build --workspace=@mentora/web
      - name: Migrate + seed database
        run: |
          npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma
          npm run db:seed --workspace=@mentora/api
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: mentora/tests/e2e
      - name: Start stack and run e2e
        run: |
          node apps/api/dist/index.js > /tmp/api.log 2>&1 &
          npm run start --workspace=@mentora/web -- -p 3000 > /tmp/web.log 2>&1 &
          # Wait for both services to be ready.
          for i in $(seq 1 30); do
            curl -sf http://localhost:4000/api/health > /dev/null && \
            curl -sf http://localhost:3000/ > /dev/null && break
            echo "waiting for stack ($i)…"; sleep 2
          done
          E2E_BASE_URL=http://localhost:3000 npm run test --workspace=@mentora/e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: mentora/tests/e2e/playwright-report
          retention-days: 7
